name: USA Future Days

on:

  workflow_dispatch:

  schedule:
    - cron: "0 */8 * * *"

permissions:
  contents: write

concurrency:
  group: usa-future
  cancel-in-progress: false

jobs:

  scrape:

    runs-on: ubuntu-latest

    timeout-minutes: 300

    strategy:

      fail-fast: false

      matrix:
        day:
          - 2
          - 3
          - 4
          - 5

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip

          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Run Advance
        run: |
          MODE=advance ADVANCE_DAYS=${{ matrix.day }} python usadailyshows.py

      - name: Commit Changes
        run: |

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add USA/

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "USA advance +${{ matrix.day }}"

          git push
