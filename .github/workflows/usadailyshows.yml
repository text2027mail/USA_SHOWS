name: USA Daily Shows

on:
  workflow_dispatch:

  schedule:
    # 09:00 UTC = 02:00 PST / 03:00 PDT
    - cron: "0 9 * * *"

permissions:
  contents: write

concurrency:
  group: usa-daily-shows
  cancel-in-progress: false

jobs:

  scrape:

    runs-on: ubuntu-latest

    timeout-minutes: 180

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Run scraper
        run: |
          python usadailyshows.py

      - name: Commit files
        run: |

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add USA/

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "USA showtimes update $(date -u +'%Y-%m-%d %H:%M UTC')"

      - name: Push
        run: |
          git push
