name: USA Daily + Tomorrow

on:

  workflow_dispatch:

  schedule:
    - cron: "0 */3 * * *"

permissions:
  contents: write

concurrency:
  group: usa-daily
  cancel-in-progress: false

jobs:

  scrape:

    runs-on: ubuntu-latest

    timeout-minutes: 180

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip

          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Daily
        run: |
          MODE=daily python usadailyshows.py

      - name: Advance +1
        run: |
          MODE=advance ADVANCE_DAYS=1 python usadailyshows.py

      - name: Commit Changes
        run: |

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add USA/

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "USA daily update"

          git push
